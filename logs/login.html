<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Learn Hub</title>
  <link rel="stylesheet" href="log.css" />
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="brand-side">
        <div class="logo-circle">LH</div>
        <h1>Learn Hub</h1>
        <p>
          Learn smarter, grow faster, and track your progress with a modern
          e-learning experience.
        </p>

        <div class="brand-features">
          <div class="feature-item">✓ Interactive Courses</div>
          <div class="feature-item">✓ Smart Quizzes</div>
          <div class="feature-item">✓ Progress Tracking</div>
        </div>
      </div>

      <div class="form-side">
        <form id="loginForm" class="auth-form">
          <h2>Login</h2>
          <p class="form-subtitle">Welcome back! Please login to your account</p>

          <div class="input-group">
            <label for="loginEmail">Email Address</label>
            <input
              type="email"
              id="loginEmail"
              placeholder="Enter your email"
              required
            />
          </div>

          <div class="input-group password-group">
            <label for="loginPassword">Password</label>
            <div class="password-box">
              <input
                type="password"
                id="loginPassword"
                placeholder="Enter your password"
                required
              />
              <span class="toggle-password" id="toggleLoginPassword">👁</span>
            </div>
          </div>

          <button type="submit" class="btn-primary">Login</button>

          <p id="loginMessage" class="message"></p>

          <div class="auth-footer">
            <p>Don't have an account? <a href="register.html">Register</a></p>
          </div>
        </form>
      </div>

    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
