<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Learn Hub</title>
  <link rel="stylesheet" href="rgs.css" />
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="brand-side">
        <div class="logo-circle">LH</div>
        <h1>Learn Hub</h1>
        <p>
          Learn smarter, grow faster, and track your progress with a modern
          e-learning experience.
        </p>

        <div class="brand-features">
          <div class="feature-item">✓ Interactive Courses</div>
          <div class="feature-item">✓ Smart Quizzes</div>
          <div class="feature-item">✓ Progress Tracking</div>
        </div>
      </div>

      <div class="form-side">
        <form id="registerForm" class="auth-form">
          <h2>Create Account</h2>
          <p class="form-subtitle">Start your learning journey today</p>

          <div class="input-group">
            <label for="fullName">Full Name</label>
            <input
              type="text"
              id="fullName"
              placeholder="Enter your full name"
              required
            />
          </div>

          <div class="input-group">
            <label for="registerEmail">Email Address</label>
            <input
              type="email"
              id="registerEmail"
              placeholder="Enter your email"
              required
            />
          </div>

          <div class="input-group password-group">
            <label for="registerPassword">Password</label>
            <div class="password-box">
              <input
                type="password"
                id="registerPassword"
                placeholder="Enter your password"
                required
              />
              <span class="toggle-password" id="togglePassword1">👁</span>
            </div>
            <small class="password-hint">
              Password should be at least 6 characters
            </small>
          </div>

          <div class="input-group password-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="password-box">
              <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm your password"
                required
              />
              <span class="toggle-password" id="togglePassword2">👁</span>
            </div>
          </div>

          <button type="submit" class="btn-primary">Create Account</button>

          <p id="registerMessage" class="message"></p>

          <div class="auth-footer">
            <p>Already have an account? <a href="login.html">Login</a></p>
          </div>
        </form>
      </div>

    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
